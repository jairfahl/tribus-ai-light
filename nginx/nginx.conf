events { worker_connections 1024; }

http {
  # Redirect HTTP → HTTPS (orbis.tax + domínios alternativos)
  server {
    listen 80;
    server_name orbis.tax www.orbis.tax tribus-ai.com.br www.tribus-ai.com.br tribus-ia.com.br www.tribus-ia.com.br;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://orbis.tax$request_uri; }
  }

  # Redirect tribus-ai.com.br + www → orbis.tax (HTTPS)
  # Cert: tribus-ai.com.br-0001 (cobre tribus-ai.com.br + www.tribus-ai.com.br)
  server {
    listen 443 ssl;
    server_name tribus-ai.com.br www.tribus-ai.com.br;

    ssl_certificate     /etc/letsencrypt/live/tribus-ai.com.br-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tribus-ai.com.br-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://orbis.tax$request_uri;
  }

  # Redirect app.tribus-ai.com.br → orbis.tax (HTTPS)
  # Cert: tribus-ai.com.br (cobre app.tribus-ai.com.br + tribus-ai.com.br)
  server {
    listen 443 ssl;
    server_name app.tribus-ai.com.br;

    ssl_certificate     /etc/letsencrypt/live/tribus-ai.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tribus-ai.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://orbis.tax$request_uri;
  }

  # www.orbis.tax → orbis.tax (HTTPS redirect — canônico)
  server {
    listen 443 ssl;
    server_name www.orbis.tax;

    ssl_certificate     /etc/letsencrypt/live/orbis.tax/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orbis.tax/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://orbis.tax$request_uri;
  }

  # orbis.tax — app principal (HTTPS)
  server {
    listen 443 ssl;
    server_name orbis.tax;

    ssl_certificate     /etc/letsencrypt/live/orbis.tax/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orbis.tax/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP em modo Report-Only para não quebrar o frontend — promover a Enforce após validar
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://orbis.tax;" always;

    # FastAPI — strip /api prefix
    location /api/ {
      proxy_pass         http://api:8000/;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      client_max_body_size 55M;
    }

    # Next.js frontend
    location / {
      proxy_pass         http://ui:3000;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_cache_bypass $http_upgrade;
    }
  }
}
