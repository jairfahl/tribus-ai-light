services:
  db:
    container_name: tribus-ai-db
    image: pgvector/pgvector:pg16
    env_file: .env
    ports:
      - "5436:5432"
    volumes:
      - taxmind_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
      -c max_connections=200
      -c tcp_keepalives_idle=30
      -c tcp_keepalives_interval=10
      -c statement_timeout=60000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5
    networks:
      - tribus-ai-net

  api:
    container_name: tribus-ai-api
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8020:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://taxmind:taxmind123@db:5432/taxmind_db
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tribus-ai-net

  ui:
    container_name: tribus-ai-ui
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.runOnSave true
    ports:
      - "8521:8501"
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
      - DATABASE_URL=postgresql://taxmind:taxmind123@db:5432/taxmind_db
    volumes:
      - ./ui:/app/ui
      - ./src:/app/src
    depends_on:
      - api
    networks:
      - tribus-ai-net

volumes:
  taxmind_pgdata:
    external: true

networks:
  tribus-ai-net:
    name: tribus-ai-net
